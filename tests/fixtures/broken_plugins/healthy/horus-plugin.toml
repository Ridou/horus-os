# returns a working Tool. The control fixture for TEST-19: proves
# that a healthy plugin still loads in the same discovery+load pass
# as the four broken fixtures — the isolation guarantee.
manifest_version = 1
name = "healthy"
version = "0.1.0"
description = "healthy fixture: control plugin that loads cleanly"
author = "horus-os contributors"
