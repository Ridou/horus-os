name: Feature request
description: Propose a new feature or capability.
title: "[feat] "
labels: ["type:feature"]
body:
  - type: markdown
    attributes:
      value: |
        Open-ended design questions belong in a Discussion, not
        an issue. Use this template only for concrete proposals
        scoped to the current `ROADMAP.md`. If you want to build
        the feature yourself once accepted, say so; the claim flow
        in
        [CONTRIBUTING.md](https://github.com/Ridou/horus-os/blob/main/CONTRIBUTING.md)
        covers how assignment works.

  - type: markdown
    attributes:
      value: |
        Thanks for the proposal. Before filing, please read
        `PROJECT.md` and `ROADMAP.md` to confirm your idea fits the
        project's scope and current direction.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? Who hits it and how often?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you solve it? Be specific. Sketch the interface, the CLI shape, or the API surface.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you consider? Why is this one better?

  - type: textarea
    id: scope
    attributes:
      label: Scope check
      description: |
        Confirm fit with `PROJECT.md`. Reference any roadmap phase
        this aligns with, or flag that this needs a roadmap update.
    validations:
      required: true

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: I read `PROJECT.md` and confirmed this is in scope.
          required: true
        - label: I searched existing issues and did not find a duplicate proposal.
          required: true
