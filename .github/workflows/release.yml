name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build, for example v0.1.0"
        required: true
        type: string
      publish_pypi:
        description: "Publish this tag to PyPI if PYPI_API_TOKEN is configured"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-release:
    name: Build and attach release artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Check out release ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Build wheel and sdist
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build

      - name: Store workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-dist
          path: dist/*
          if-no-files-found: error

      - name: Attach artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          files: dist/*
          fail_on_unmatched_files: true

  publish-pypi:
    name: Publish to PyPI
    needs: build-release
    runs-on: ubuntu-latest
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' &&
        inputs.publish_pypi
      }}

    steps:
      - name: Check PyPI token
        id: pypi-token
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -z "$PYPI_API_TOKEN" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "PYPI_API_TOKEN is not configured; skipping PyPI publish."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out release ref
        if: steps.pypi-token.outputs.configured == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Set up Python
        if: steps.pypi-token.outputs.configured == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Build and upload to PyPI
        if: steps.pypi-token.outputs.configured == 'true'
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          python -m build
          python -m twine upload dist/*
