name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: lint+test / ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run ruff lint
        run: ruff check .

      - name: Run ruff format check
        run: ruff format --check .

      - name: time.time() lint gate (Pitfall 3)
        run: python scripts/lint_no_wallclock.py

      - name: Run pytest
        run: pytest -v

      # METRIC-05 + TEST-12: asserts Phase 33 capture overhead stays within
      # 50ms of the v0.3 baseline (tests/perf/v0_3_baseline.json). Skips
      # when no matching (os, python) baseline entry exists so CI does not
      # block on unseeded combos.
      - name: capture-overhead benchmark (METRIC-05 / TEST-12)
        run: pytest tests/perf/test_capture_overhead.py -v

      - name: CLI smoke check
        run: python -m horus_os --version

  install-smoke:
    name: install-smoke / ${{ matrix.os }} / Python ${{ matrix.python-version }}
    needs: lint-and-test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Fresh install with all extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install '.[all]'

      - name: Run install smoke
        run: python scripts/install_smoke.py
