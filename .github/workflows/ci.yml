name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: read-all

jobs:
  lint-and-test:
    name: lint+test / ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run ruff lint
        run: ruff check .

      - name: Run ruff format check
        run: ruff format --check .

      - name: Run actionlint (CIHARD-05)
        uses: raven-actions/actionlint@205b530c5d9fa8f44ae9ed59f341a0db994aa6f8 # v2.1.2
        with:
          # raven-actions/actionlint prepends the 'v'; pass the bare semver so
          # the release tag resolves to v1.7.12 (a leading 'v' yields vv1.7.12,
          # a 404 against rhysd/actionlint releases).
          version: 1.7.12

      - name: time.time() lint gate (Pitfall 3)
        run: python scripts/lint_no_wallclock.py

      - name: Run pytest
        run: pytest -v

      # METRIC-05 + TEST-12: asserts Phase 33 capture overhead stays within
      # 50ms of the v0.3 baseline (tests/perf/v0_3_baseline.json). Skips
      # when no matching (os, python) baseline entry exists so CI does not
      # block on unseeded combos.
      - name: capture-overhead benchmark (METRIC-05 / TEST-12)
        run: pytest tests/perf/test_capture_overhead.py -v

      - name: CLI smoke check
        run: python -m horus_os --version

      # D-08: em-dash guard - runs once on ubuntu/3.11 only.
      # Scoped to files changed in this push/PR to avoid tripping on
      # legacy content that predates this rule. The self-test confirms
      # the grep actually detects U+2014 before scanning changed files.
      - name: No em-dashes in committed prose (D-08)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        shell: bash
        run: |
          # Positive self-test: guard MUST detect the deliberate fixture
          if ! grep -q $'\xe2\x80\x94' tests/ci_guards/sample_emdash.txt; then
            echo "ERROR: self-test failed - em-dash guard cannot detect U+2014"
            exit 1
          fi
          echo "Self-test passed: em-dash detected in fixture."
          # Collect files changed in this push or PR (against the base ref)
          BASE_REF="${GITHUB_BASE_REF:-}"
          if [ -n "$BASE_REF" ]; then
            CHANGED=$(git diff --name-only "origin/${BASE_REF}" HEAD -- \
              '*.py' '*.md' '*.ts' '*.tsx' '*.yml' '*.yaml' '*.toml' 2>/dev/null || true)
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD -- \
              '*.py' '*.md' '*.ts' '*.tsx' '*.yml' '*.yaml' '*.toml' 2>/dev/null || true)
          fi
          # Exclude the deliberate fixture from the scan
          CHANGED=$(echo "$CHANGED" | grep -v '^tests/ci_guards/sample_emdash\.txt$' || true)
          if [ -z "$CHANGED" ]; then
            echo "No changed files to scan. Guard passes."
            exit 0
          fi
          MATCHES=""
          while IFS= read -r f; do
            [ -f "$f" ] || continue
            if grep -qn $'\xe2\x80\x94' "$f"; then
              MATCHES="$MATCHES $f"
            fi
          done <<< "$CHANGED"
          if [ -n "$MATCHES" ]; then
            echo "ERROR: em-dash (U+2014) found in changed files:$MATCHES"
            exit 1
          fi
          echo "No em-dashes found in changed files."

      # D-08: reserved private-pipeline and personal-data name guard.
      # Runs once on ubuntu/3.11 only, scoped to changed files.
      - name: No reserved private-pipeline or personal-data names (D-08)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        shell: bash
        run: |
          BASE_REF="${GITHUB_BASE_REF:-}"
          if [ -n "$BASE_REF" ]; then
            CHANGED=$(git diff --name-only "origin/${BASE_REF}" HEAD -- \
              '*.py' '*.md' '*.ts' '*.tsx' '*.yml' '*.yaml' '*.toml' 2>/dev/null || true)
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD -- \
              '*.py' '*.md' '*.ts' '*.tsx' '*.yml' '*.yaml' '*.toml' 2>/dev/null || true)
          fi
          # Exclude the ci_guards fixture directory from the scan.
          CHANGED=$(echo "$CHANGED" | grep -v '^tests/ci_guards/' || true)
          if [ -z "$CHANGED" ]; then
            echo "No changed files to scan. Guard passes."
            exit 0
          fi
          MATCHES=""
          while IFS= read -r f; do
            [ -f "$f" ] || continue
            # Pattern from 60-RESEARCH.md Pattern 4 / PITFALLS.md Pitfall 18.
            # Each reserved word carries one single-char class (e.g. r[a]lph)
            # so this pattern matches the real names yet contains no literal
            # reserved word itself: the guard scans workflow files (no blanket
            # .github/workflows exclusion) without self-matching on this line.
            # Atlas, Vitriol, and Sol are deliberately NOT guarded: they are
            # sanctioned public persona names shipped as featured agent-store
            # bundles (src/horus_os/store). The remaining names stay reserved.
            if grep -qniE '\b(r[a]lph|q[u]ill|s[c]ribe|p[o]stman)\b' "$f"; then
              MATCHES="$MATCHES $f"
            fi
          done <<< "$CHANGED"
          if [ -n "$MATCHES" ]; then
            echo "ERROR: reserved private-pipeline names found in changed files:$MATCHES"
            exit 1
          fi
          echo "No reserved private-pipeline names found in changed files."

  install-smoke:
    name: install-smoke / ${{ matrix.os }} / Python ${{ matrix.python-version }}
    needs: lint-and-test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Fresh install with all extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install '.[all]'

      - name: Run install smoke
        run: python scripts/install_smoke.py

  # TEST-15 substrate (no-otel variant): bare [dev] install MUST NOT
  # pull opentelemetry; OtelAdapter MUST import cleanly; start() MUST
  # raise a RuntimeError carrying the install hint (NEVER a bare
  # ModuleNotFoundError). Pitfall 12 enforcement at the OS level on
  # the 3-OS x 2-python matrix.
  install-smoke-no-otel:
    name: install-smoke-no-otel / ${{ matrix.os }} / Python ${{ matrix.python-version }}
    needs: lint-and-test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      # The install hint surfaced by OtelAdapter.start() is the literal
      # string "pip install horus-os[otel]"; the runtime-error assertion
      # script greps for that exact substring.
      - name: Install with [dev] (no otel)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Assert opentelemetry is NOT installed
        run: |
          python -c "import importlib.util, sys; assert importlib.util.find_spec('opentelemetry') is None, 'opentelemetry leaked into [dev] install'; print('OK: opentelemetry absent')"
      - name: Assert adapter imports cleanly without opentelemetry
        run: |
          python -c "from horus_os.adapters.otel_adapter import OtelAdapter; a = OtelAdapter(); print(f'imported {a.name}')"
      - name: Assert start raises clean RuntimeError with install hint (not ModuleNotFoundError)
        run: |
          python scripts/_ci_assert_otel_runtime_error.py

  # TEST-15 substrate (with-otel variant): [dev,otel] install pulls
  # opentelemetry-sdk + opentelemetry-exporter-otlp-proto-http; adapter
  # start() succeeds when OTEL_EXPORTER_OTLP_ENDPOINT is set; one span
  # emitted via InMemorySpanExporter after publishing one LLMCallEvent.
  install-smoke-with-otel:
    name: install-smoke-with-otel / ${{ matrix.os }} / Python ${{ matrix.python-version }}
    needs: lint-and-test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install with [dev,otel]
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,otel]"
      - name: Assert opentelemetry IS installed
        run: |
          python -c "import opentelemetry; from opentelemetry.sdk.trace import TracerProvider; from opentelemetry.exporter.otlp.proto.http.trace_exporter import OTLPSpanExporter; print('opentelemetry SDK + OTLP HTTP exporter present')"
      - name: Assert start succeeds and span emits via InMemorySpanExporter
        env:
          OTEL_EXPORTER_OTLP_ENDPOINT: http://127.0.0.1:14318
        run: |
          python scripts/_ci_assert_otel_with_extra.py


  # TEST-20 (Phase 49): full plugin install + grant + load smoke on the
  # 3-OS x 2-Python matrix. Pip-installs the reference plugin from
  # examples/horus-os-example-plugin, then drives the full discovery ->
  # registry -> permission gate -> loader pipeline via scripts/install_smoke_plugin.py
  # (a TestClient-based driver that exercises the FastAPI app in-process).
  # The release-gate's `plugin-install-smoke-ci` check (Phase 49 Task 2)
  # greps ci.yml for the literal `install-smoke-plugin` string so this
  # job cannot silently disappear between releases.
  install-smoke-plugin:
    name: install-smoke-plugin / ${{ matrix.os }} / Python ${{ matrix.python-version }}
    needs: lint-and-test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install horus-os in editable mode + dev tools + dashboard extra
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,dashboard]"
      - name: Install reference plugin (Phase 48)
        shell: bash
        run: |
          python -m pip install -e ./examples/horus-os-example-plugin --no-deps
      - name: Prepare isolated data dir + init horus-os DB (linux/macos)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p "$HOME/horus-smoke-data"
          python -c "from pathlib import Path; from horus_os.storage import Database; Database(Path('$HOME/horus-smoke-data/horus.sqlite')).init(); print('OK init')"
      - name: Prepare isolated data dir + init horus-os DB (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:HORUS_DATA = "$env:USERPROFILE\horus-smoke-data"
          New-Item -ItemType Directory -Force -Path $env:HORUS_DATA | Out-Null
          python -c "from pathlib import Path; from horus_os.storage import Database; Database(Path(r'$env:HORUS_DATA') / 'horus.sqlite').init(); print('OK init')"
      - name: Run plugin install-smoke (linux/macos)
        if: runner.os != 'Windows'
        shell: bash
        env:
          HORUS_DATA: ${{ runner.temp }}/../horus-smoke-data
        run: |
          export HORUS_DATA="$HOME/horus-smoke-data"
          python scripts/install_smoke_plugin.py
      - name: Run plugin install-smoke (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:HORUS_DATA = "$env:USERPROFILE\horus-smoke-data"
          python scripts/install_smoke_plugin.py

  # TEST-38 + REL-18 (v0.8 light extras): install the cross-OS-clean v0.8
  # extras (local-llm, mcp, web, pdf, vision) and prove every new capability
  # module imports with NO cloud key set, then run scripts/install_smoke.py so
  # the v0.8 tool-absence assertions run with the extras present but with no
  # provider, search, or MCP config (REL-19 zero-config-start coverage rides
  # along here: no v0.8 tool may auto-register on a bare install).
  install-smoke-v0-8-extras:
    name: install-smoke-v0-8-extras / ${{ matrix.os }} / Python ${{ matrix.python-version }}
    needs: lint-and-test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install with light v0.8 extras (no local-memory)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,local-llm,mcp,web,pdf,vision]"
      - name: Import every v0.8 module with no cloud key set
        env:
          ANTHROPIC_API_KEY: ""
          GEMINI_API_KEY: ""
          GOOGLE_API_KEY: ""
        run: |
          python -c "import horus_os._providers._openai_compat; import horus_os.mcp_client; import horus_os.tools.web_search; import horus_os.tools.vision; import horus_os.research; import horus_os.skills; import pypdf; import readability; print('V0_8_LIGHT_EXTRAS_OK')"
      - name: Run install smoke (v0.8 tool-absence assertions, zero config)
        env:
          ANTHROPIC_API_KEY: ""
          GEMINI_API_KEY: ""
          GOOGLE_API_KEY: ""
        run: python scripts/install_smoke.py

  # TEST-38 (v0.8 local-memory wheels): the sole purpose of this job is to
  # prove the onnxruntime <1.24.0 pin in the [local-memory] extra resolves a
  # real wheel on macOS, Ubuntu, and Windows for Python 3.11 and 3.12.
  # onnxruntime publishes Intel-macOS wheels up to 1.23.x (universal2 through
  # 1.22.x, explicit x86_64 in 1.23.x); 1.24.1+ ships arm64 only. The <1.24.0
  # pin keeps an Intel-macOS wheel available so Intel users get a binary
  # install with no build chain. The version-ceiling assertion fails the gate
  # if a future resolver drift pulls 1.24.0 or newer.
  install-smoke-local-memory:
    name: install-smoke-local-memory / ${{ matrix.os }} / Python ${{ matrix.python-version }}
    needs: lint-and-test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install with [dev,local-memory]
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,local-memory]"
      - name: Assert local-memory wheels imported on every OS
        run: |
          python -c "import onnxruntime, fastembed, sqlite_vec; print('LOCAL_MEMORY_WHEELS_OK', onnxruntime.__version__)"
      - name: Assert resolved onnxruntime is below 1.24.0 (Intel macOS pin)
        run: |
          python -c "import onnxruntime; from packaging.version import Version; v = Version(onnxruntime.__version__); assert v < Version('1.24.0'), f'onnxruntime {v} resolved >= 1.24.0; the Intel-macOS wheel pin drifted'; print('ONNXRUNTIME_PIN_OK', v)"
