# Phase 53 SUPPLY-01 + SUPPLY-02 + SUPPLY-04 substrate: PR-time supply-chain
# scan. Two jobs: pip-audit (matrix over [dev] and [dev,otel] install variants
# mirrors the install-smoke-no-otel / install-smoke-with-otel pattern in ci.yml)
# and dependency-review (license allowlist + PR comment on rejection). NO
# id-token: write anywhere because audit.yml runs on PRs from forks and OIDC
# access there would let fork PRs mint sigstore identities. Every uses: line
# is SHA-pinned per CIHARD-04. actions/checkout uses persist-credentials: false
# per CIHARD-03.

name: audit

on:
  pull_request:

permissions: read-all

jobs:
  pip-audit:
    name: pip-audit (${{ matrix.extras }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        extras: ["[dev]", "[dev,otel]"]
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install project with extras
        run: pip install -e ".${{ matrix.extras }}"

      - name: pip-audit (osv source)
        uses: pypa/gh-action-pip-audit@1220774d901786e6f652ae159f7b6bc8fea6d266 # v1.1.0
        with:
          inputs: "."
          extra-args: "-s osv --ignore-vulns-file .github/pip-audit-ignore.txt"

      - name: pip-audit (pypi source)
        uses: pypa/gh-action-pip-audit@1220774d901786e6f652ae159f7b6bc8fea6d266 # v1.1.0
        with:
          inputs: "."
          extra-args: "-s pypi --ignore-vulns-file .github/pip-audit-ignore.txt"

  dependency-review:
    name: dependency-review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Dependency review
        uses: actions/dependency-review-action@595b5aeba73380359d98a5e087f648dbb0edce1b # v4.7.3
        with:
          allow-licenses: Apache-2.0, MIT, BSD-2-Clause, BSD-3-Clause, ISC, PSF-2.0
          comment-summary-in-pr: on-failure
