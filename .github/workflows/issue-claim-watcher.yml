name: Issue claim watcher

# Posts a canned acknowledgment when an outside commenter uses
# claim-the-issue phrasing on an open issue or PR conversation,
# so claimers immediately learn how assignment works instead of
# waiting for the next triage pass.
# The marker comment <!-- horus-os-claim-watcher --> in the reply
# body prevents duplicate replies on the same thread.
#
# Tune or disable by editing the regex in the "Check for claim
# language" step, or by disabling this workflow in the repo's
# Actions settings. Maintainer comments and bot comments are
# skipped.

on:
  issue_comment:
    types: [created]

permissions: read-all

jobs:
  detect-claim:
    permissions:
      issues: write
    if: >-
      github.event.issue.state == 'open'
      && github.event.comment.user.type != 'Bot'
      && github.event.comment.user.login != github.event.repository.owner.login
    runs-on: ubuntu-latest
    steps:
      - name: Check for claim language
        id: check
        env:
          BODY: ${{ github.event.comment.body }}
        run: |
          set -eo pipefail
          body_lower=$(printf '%s' "$BODY" | tr '[:upper:]' '[:lower:]')
          if printf '%s' "$body_lower" | grep -Eq '(\bi (can|will|would like to|want to|am going to|am gonna|am about to|am happy to|would love to) (take|work on|tackle|pick up|handle|claim|do|fix|implement|grab|own)\b|\b(claiming|i claim|dibs on|i.?ll (take|work on|tackle|pick up|handle|do|fix|implement|grab))\b|\bworking on this\b|\b(im|i am) on it\b|\bassign(ing| this| me| it)?( to)? me\b|\bplease assign\b|\b(may|can|could) i (take|work on|tackle|pick up|handle|do|fix|implement|have|claim|grab)\b|\blet me (take|work on|tackle|pick up|handle|do|fix|implement|have|claim|grab)\b|\bi.?d like to (take|work on|tackle|pick up|handle|do|fix|implement|claim|grab|own) this\b)'; then
            echo "matched=true" >> "$GITHUB_OUTPUT"
          else
            echo "matched=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip if already replied on this thread
        id: dedupe
        if: steps.check.outputs.matched == 'true'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const marker = '<!-- horus-os-claim-watcher -->';
            const comments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                per_page: 100,
              }
            );
            const already = comments.some(
              (c) => (c.body || '').includes(marker)
            );
            core.setOutput('already', already ? 'true' : 'false');

      - name: Post canned reply
        if: steps.check.outputs.matched == 'true' && steps.dedupe.outputs.already == 'false'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const body = [
              '<!-- horus-os-claim-watcher -->',
              'Hey, thanks for offering, and claim noted.',
              '',
              `Heads-up on how assignment works here: the maintainer reviews claims (usually on the weekly triage pass) and assigns the issue by adding the \`claimed\` label. Until that label lands, the issue is not reserved. Once assigned, the expectation is a draft PR within 7 days; the full flow is in [CONTRIBUTING.md](https://github.com/${owner}/${repo}/blob/main/CONTRIBUTING.md).`,
              '',
              'While you wait: reading the relevant source and sketching your approach in a comment speeds up the assignment decision, especially for first-time contributors.',
              '',
              'Sorry for the canned reply, an automation flagged the wording. If you were not claiming, ignore me.',
            ].join('\n');
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: context.issue.number,
              body,
            });
