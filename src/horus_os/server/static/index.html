<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>horus-os</title>
  <style>
    :root {
      --bg: #0d1117;
      --bg-elev: #161b22;
      --bg-input: #0d1117;
      --border: #30363d;
      --text: #c9d1d9;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --success: #3fb950;
      --error: #f85149;
      --font: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; line-height: 1.55; }
    header { border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
    header h1 { margin: 0; font-size: 18px; font-weight: 600; }
    header .version { color: var(--text-muted); font-size: 12px; }
    nav { display: flex; gap: 4px; padding: 8px 24px; border-bottom: 1px solid var(--border); background: var(--bg-elev); }
    nav button { background: transparent; color: var(--text-muted); border: none; padding: 8px 14px; border-radius: 6px; cursor: pointer; font: inherit; }
    nav button:hover { color: var(--text); background: rgba(177, 186, 196, 0.12); }
    nav button.active { color: var(--text); background: rgba(56, 139, 253, 0.15); }
    main { padding: 24px; max-width: 1200px; margin: 0 auto; }
    .tab { display: none; }
    .tab.active { display: block; }
    textarea, input[type=text] { width: 100%; background: var(--bg-input); border: 1px solid var(--border); color: var(--text); padding: 10px 12px; border-radius: 6px; font: inherit; }
    textarea { min-height: 80px; resize: vertical; }
    textarea:focus, input:focus { outline: none; border-color: var(--accent); }
    button.primary { background: var(--accent); color: #0d1117; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font: inherit; font-weight: 600; }
    button.primary:disabled { opacity: 0.5; cursor: not-allowed; }
    button.ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border); padding: 6px 12px; border-radius: 6px; cursor: pointer; font: inherit; }
    button.ghost:hover { color: var(--text); border-color: var(--text-muted); }
    .row { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; }
    .grow { flex: 1; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--border); font-size: 13px; vertical-align: top; }
    th { color: var(--text-muted); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
    td.muted { color: var(--text-muted); }
    .pill { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; }
    .pill.success { background: rgba(63, 185, 80, 0.15); color: var(--success); }
    .pill.error { background: rgba(248, 81, 73, 0.15); color: var(--error); }
    .pill.muted { background: rgba(139, 148, 158, 0.15); color: var(--text-muted); }
    pre { background: var(--bg-elev); border: 1px solid var(--border); padding: 12px 14px; border-radius: 6px; overflow-x: auto; white-space: pre-wrap; word-wrap: break-word; margin: 0; }
    .response { margin-top: 16px; }
    .status { margin-top: 8px; color: var(--text-muted); font-size: 12px; }
    .empty { text-align: center; padding: 40px; color: var(--text-muted); }
    .tree-toggle { background: transparent; color: var(--text-muted); border: 1px solid var(--border); padding: 2px 8px; border-radius: 4px; cursor: pointer; font: inherit; font-size: 11px; }
    .tree-toggle:hover { color: var(--text); border-color: var(--text-muted); }
    .tree-row td { background: rgba(56, 139, 253, 0.04); padding-left: 24px; }
    .tree-row table { margin-top: 4px; }
    .tree-row th { background: transparent; }
    .stream-tool { display: block; color: var(--text-muted); font-size: 12px; padding: 4px 0; }
    .stream-error { color: var(--error); }
    /* Phase 36 Observability tab */
    .obs-panel { margin-bottom: 24px; }
    .obs-panel h3 { color: var(--text-muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; margin: 0 0 8px 0; }
    .obs-banner { padding: 8px 12px; border-radius: 6px; margin-bottom: 12px; font-size: 13px; }
    .obs-banner.yellow { background: rgba(210, 153, 34, 0.15); border: 1px solid rgb(210, 153, 34); color: rgb(210, 153, 34); }
    .obs-banner.red { background: rgba(248, 81, 73, 0.15); border: 1px solid var(--error); color: var(--error); }
    .cost-bar { display: flex; align-items: center; gap: 8px; margin: 4px 0; font-size: 13px; }
    .cost-bar-fill { background: var(--accent); height: 18px; border-radius: 3px; min-width: 1px; }
    .uncosted-tile { padding: 8px 12px; border: 1px dashed var(--border); border-radius: 6px; color: var(--text-muted); margin-bottom: 12px; font-size: 13px; }
    select { background: var(--bg-input); border: 1px solid var(--border); color: var(--text); padding: 6px 10px; border-radius: 6px; font: inherit; font-size: 13px; }
    select:focus { outline: none; border-color: var(--accent); }
  </style>
</head>
<body>
  <header>
    <h1>horus-os</h1>
    <span class="version" id="version">connecting</span>
  </header>
  <nav>
    <button class="active" data-tab="chat">Chat</button>
    <button data-tab="traces">Traces</button>
    <button data-tab="agents">Agents</button>
    <button data-tab="writes">Writes</button>
    <button data-tab="adapters">Adapters</button>
    <button data-tab="observability">Observability</button>
  </nav>
  <main>
    <section class="tab active" id="chat">
      <textarea id="prompt" placeholder="Ask the agent. The configured tools include read_file, list_notes, search_notes, read_note, create_note, append_note."></textarea>
      <div class="row" style="margin-top: 8px;">
        <button class="primary" id="send">Send</button>
        <span class="status" id="chat-status"></span>
      </div>
      <div class="response" id="chat-response"></div>
    </section>
    <section class="tab" id="traces">
      <div class="row">
        <h2 style="margin: 0; font-size: 14px;">Recent traces</h2>
        <span class="grow"></span>
        <button class="ghost" id="refresh-traces">Refresh</button>
      </div>
      <div id="traces-body"><div class="empty">loading</div></div>
    </section>
    <section class="tab" id="agents">
      <div class="row">
        <h2 style="margin: 0; font-size: 14px;">Agent profiles</h2>
        <span class="grow"></span>
        <button class="ghost" id="refresh-agents">Refresh</button>
      </div>
      <div id="agents-body"><div class="empty">loading</div></div>
    </section>
    <section class="tab" id="writes">
      <div class="row">
        <h2 style="margin: 0; font-size: 14px;">Note writes (audit trail)</h2>
        <span class="grow"></span>
        <button class="ghost" id="refresh-writes">Refresh</button>
      </div>
      <div id="writes-body"><div class="empty">loading</div></div>
    </section>
    <section class="tab" id="adapters">
      <div class="row">
        <h2 style="margin: 0; font-size: 14px;">Adapter status</h2>
        <span class="grow"></span>
        <button class="ghost" id="refresh-adapters">Refresh</button>
      </div>
      <div id="adapters-body"><div class="empty">loading</div></div>
    </section>
    <section class="tab" id="observability">
      <div class="row">
        <h2 style="margin: 0; font-size: 14px;">Observability</h2>
        <span class="grow"></span>
        <select id="obs-window">
          <option value="24h">24h</option>
          <option value="7d" selected>7d</option>
          <option value="30d">30d</option>
        </select>
        <button class="ghost" id="refresh-observability">Refresh</button>
      </div>
      <div id="obs-banner-container"></div>
      <div class="obs-panel" id="obs-cost-panel">
        <h3>Cost by agent</h3>
        <div id="obs-cost-body" class="empty">loading</div>
      </div>
      <div class="obs-panel" id="obs-latency-panel">
        <h3>Latency p50 / p95</h3>
        <div id="obs-latency-body" class="empty">loading</div>
      </div>
      <div class="obs-panel" id="obs-tools-panel">
        <h3>Tool reliability</h3>
        <div id="obs-tools-body" class="empty">loading</div>
      </div>
    </section>
  </main>
  <script>
    const $ = (sel) => document.querySelector(sel);
    const $$ = (sel) => document.querySelectorAll(sel);

    // Phase 27: poll interval for the Adapters tab; cleared on tab switch.
    let adaptersPoll = null;
    // Phase 36: poll interval for the Observability tab; cleared on tab switch.
    let observabilityPoll = null;

    async function fetchJson(url, opts = {}) {
      const r = await fetch(url, opts);
      const body = await r.json().catch(() => ({}));
      if (!r.ok) {
        const detail = typeof body.detail === "string" ? body.detail : JSON.stringify(body.detail || body);
        throw new Error(`${r.status} ${detail}`);
      }
      return body;
    }

    function setTab(name) {
      $$("nav button").forEach((b) => b.classList.toggle("active", b.dataset.tab === name));
      $$(".tab").forEach((t) => t.classList.toggle("active", t.id === name));
      // Clear any previous adapters poll; restart only if the new tab needs it.
      if (adaptersPoll) {
        clearInterval(adaptersPoll);
        adaptersPoll = null;
      }
      // Phase 36: same contract for the Observability tab poll.
      if (observabilityPoll) {
        clearInterval(observabilityPoll);
        observabilityPoll = null;
      }
      if (name === "traces") loadTraces();
      if (name === "agents") loadAgents();
      if (name === "writes") loadWrites();
      if (name === "adapters") {
        loadAdapters();
        adaptersPoll = setInterval(loadAdapters, 5000);
      }
      if (name === "observability") {
        loadObservability();
        observabilityPoll = setInterval(loadObservability, 5000);
      }
    }
    $$("nav button").forEach((b) => b.addEventListener("click", () => setTab(b.dataset.tab)));

    async function bootstrap() {
      try {
        const h = await fetchJson("/api/health");
        $("#version").textContent = `v${h.version}`;
      } catch (e) {
        $("#version").textContent = "offline";
      }
    }
    bootstrap();

    $("#send").addEventListener("click", async () => {
      const prompt = $("#prompt").value.trim();
      if (!prompt) return;
      $("#send").disabled = true;
      $("#chat-status").textContent = "running ...";
      const responseRoot = $("#chat-response");
      responseRoot.innerHTML = "";
      const pre = document.createElement("pre");
      responseRoot.appendChild(pre);
      const status = document.createElement("div");
      status.className = "status";
      responseRoot.appendChild(status);
      const startMs = performance.now();
      try {
        const r = await fetch("/api/chat/stream", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ prompt }),
        });
        if (!r.ok) {
          const body = await r.json().catch(() => ({}));
          const detail = typeof body.detail === "string" ? body.detail : JSON.stringify(body.detail || body);
          pre.classList.add("stream-error");
          pre.textContent = `${r.status} ${detail}`;
          $("#chat-status").textContent = "";
          $("#send").disabled = false;
          return;
        }
        const reader = r.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";
        let traceId = null;
        let latencyMs = null;
        let toolCount = 0;
        let sawError = false;
        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const parts = buffer.split("\n\n");
          buffer = parts.pop() || "";
          for (const part of parts) {
            const line = part.trim();
            if (!line.startsWith("data: ")) continue;
            let payload;
            try { payload = JSON.parse(line.slice(6)); } catch (e) { continue; }
            if (payload.type === "token") {
              pre.appendChild(document.createTextNode(payload.text));
            } else if (payload.type === "tool_call") {
              toolCount += 1;
              const aside = document.createElement("div");
              aside.className = "stream-tool";
              aside.textContent = `[tool-request] ${payload.name}(${JSON.stringify(payload.input)})`;
              responseRoot.insertBefore(aside, status);
            } else if (payload.type === "done") {
              traceId = payload.trace_id;
              latencyMs = payload.latency_ms;
            } else if (payload.type === "error") {
              sawError = true;
              pre.classList.add("stream-error");
              pre.appendChild(document.createTextNode(`\n[error] ${payload.message}`));
              if (payload.trace_id) traceId = payload.trace_id;
            }
          }
        }
        if (latencyMs === null) latencyMs = Math.round(performance.now() - startMs);
        const traceSuffix = traceId ? `, trace ${traceId.slice(0, 8)}` : "";
        const meta = sawError
          ? `[error after ${latencyMs}ms${traceSuffix}]`
          : `[streamed, ${latencyMs}ms${traceSuffix}, ${toolCount} tool calls]`;
        status.textContent = meta;
        $("#chat-status").textContent = "";
      } catch (e) {
        pre.classList.add("stream-error");
        pre.textContent = e.message || String(e);
        $("#chat-status").textContent = "";
      } finally {
        $("#send").disabled = false;
      }
    });

    async function loadTraces() {
      const body = $("#traces-body");
      body.innerHTML = '<div class="empty">loading</div>';
      try {
        const data = await fetchJson("/api/traces?limit=50");
        if (!data.traces.length) {
          body.innerHTML = '<div class="empty">no traces yet</div>';
          return;
        }
        const rows = data.traces.map((t) => {
          const status = t.status === "success"
            ? '<span class="pill success">success</span>'
            : '<span class="pill error">error</span>';
          const prompt = t.prompt.length > 60 ? t.prompt.slice(0, 60) + "..." : t.prompt;
          const agent = t.agent_profile_name || "";
          const expand = t.agent_profile_name
            ? `<button class="tree-toggle" data-trace="${escapeHtml(t.trace_id)}">expand</button>`
            : "";
          return `<tr data-trace-row="${escapeHtml(t.trace_id)}"><td class="muted">${escapeHtml(t.created_at)}</td><td>${escapeHtml(t.provider)}</td><td>${escapeHtml(t.model)}</td><td>${status}</td><td>${escapeHtml(agent)}</td><td>${escapeHtml(prompt)}</td><td>${expand}</td></tr>`;
        }).join("");
        body.innerHTML = `<table><thead><tr><th>created_at</th><th>provider</th><th>model</th><th>status</th><th>agent</th><th>prompt</th><th></th></tr></thead><tbody>${rows}</tbody></table>`;
        body.querySelectorAll(".tree-toggle").forEach((btn) => {
          btn.addEventListener("click", () => toggleChildren(btn));
        });
      } catch (e) {
        body.innerHTML = `<div class="empty">${escapeHtml(e.message)}</div>`;
      }
    }
    $("#refresh-traces").addEventListener("click", loadTraces);

    async function toggleChildren(btn) {
      const traceId = btn.dataset.trace;
      const row = btn.closest("tr");
      const next = row.nextElementSibling;
      if (next && next.classList.contains("tree-row")) {
        next.remove();
        btn.textContent = "expand";
        return;
      }
      btn.textContent = "loading ...";
      try {
        const data = await fetchJson(`/api/traces/${encodeURIComponent(traceId)}/children`);
        const childRows = data.children.map((c) => {
          const status = c.status === "success"
            ? '<span class="pill success">success</span>'
            : '<span class="pill error">error</span>';
          const prompt = c.prompt.length > 60 ? c.prompt.slice(0, 60) + "..." : c.prompt;
          return `<tr><td class="muted">${escapeHtml(c.created_at)}</td><td>${escapeHtml(c.provider)}</td><td>${escapeHtml(c.model)}</td><td>${status}</td><td>${escapeHtml(c.agent_profile_name || "")}</td><td>${escapeHtml(prompt)}</td></tr>`;
        }).join("");
        const inner = data.children.length
          ? `<table><thead><tr><th>created_at</th><th>provider</th><th>model</th><th>status</th><th>agent</th><th>prompt</th></tr></thead><tbody>${childRows}</tbody></table>`
          : '<div class="empty">no children</div>';
        const tr = document.createElement("tr");
        tr.className = "tree-row";
        const td = document.createElement("td");
        td.colSpan = 7;
        td.innerHTML = inner;
        tr.appendChild(td);
        row.parentNode.insertBefore(tr, row.nextSibling);
        btn.textContent = "collapse";
      } catch (e) {
        btn.textContent = "expand";
        alert(e.message);
      }
    }

    async function loadAgents() {
      const body = $("#agents-body");
      body.innerHTML = '<div class="empty">loading</div>';
      try {
        const data = await fetchJson("/api/agents");
        if (!data.agents.length) {
          body.innerHTML = '<div class="empty">no agent profiles yet</div>';
          return;
        }
        const rows = data.agents.map((a) => {
          const model = a.default_model || "(default)";
          const tools = a.allowed_tools === null
            ? "(all)"
            : (a.allowed_tools.length ? a.allowed_tools.join(", ") : "(none)");
          const last = a.last_activity_at || "(never)";
          const prompt = (a.system_prompt || "").length > 60
            ? a.system_prompt.slice(0, 60) + "..."
            : (a.system_prompt || "");
          return `<tr><td>${escapeHtml(a.name)}</td><td>${escapeHtml(model)}</td><td>${escapeHtml(tools)}</td><td class="muted">${escapeHtml(last)}</td><td class="muted">${escapeHtml(prompt)}</td></tr>`;
        }).join("");
        body.innerHTML = `<table><thead><tr><th>name</th><th>default_model</th><th>allowed_tools</th><th>last_activity_at</th><th>system_prompt</th></tr></thead><tbody>${rows}</tbody></table>`;
      } catch (e) {
        body.innerHTML = `<div class="empty">${escapeHtml(e.message)}</div>`;
      }
    }
    $("#refresh-agents").addEventListener("click", loadAgents);

    async function loadWrites() {
      const body = $("#writes-body");
      body.innerHTML = '<div class="empty">loading</div>';
      try {
        const data = await fetchJson("/api/writes?limit=50");
        if (!data.writes.length) {
          body.innerHTML = '<div class="empty">no writes yet</div>';
          return;
        }
        const rows = data.writes.map((w) => `<tr><td class="muted">${escapeHtml(w.created_at)}</td><td>${escapeHtml(w.operation)}</td><td>${escapeHtml(w.rel_path)}</td><td>${w.bytes_after - w.bytes_before} bytes</td></tr>`).join("");
        body.innerHTML = `<table><thead><tr><th>created_at</th><th>operation</th><th>path</th><th>delta</th></tr></thead><tbody>${rows}</tbody></table>`;
      } catch (e) {
        body.innerHTML = `<div class="empty">${escapeHtml(e.message)}</div>`;
      }
    }
    $("#refresh-writes").addEventListener("click", loadWrites);

    async function loadAdapters() {
      const body = $("#adapters-body");
      try {
        const data = await fetchJson("/api/adapters");
        if (!data.adapters.length) {
          body.innerHTML = '<div class="empty">no adapters discovered</div>';
          return;
        }
        const rows = data.adapters.map((a) => {
          let pillClass = "muted";
          if (a.status === "running") pillClass = "success";
          else if (a.status === "error") pillClass = "error";
          const pill = `<span class="pill ${pillClass}">${escapeHtml(a.status)}</span>`;
          const last = a.last_activity_at || "(never)";
          const errMsgShort = a.error_message
            ? escapeHtml(a.error_message.length > 80 ? a.error_message.slice(0, 80) + "..." : a.error_message)
            : "";
          let toggle;
          if (!a.supports_toggle) {
            toggle = `<button class="ghost" disabled title="adapter has no start/stop hooks">n/a</button>`;
          } else if (a.status === "running") {
            toggle = `<button class="ghost" data-action="disable" data-name="${escapeHtml(a.name)}">Disable</button>`;
          } else {
            toggle = `<button class="ghost" data-action="enable" data-name="${escapeHtml(a.name)}">Enable</button>`;
          }
          return `<tr><td>${escapeHtml(a.name)}</td><td>${pill}</td><td class="muted">${escapeHtml(last)}</td><td>${a.error_count}</td><td class="muted" title="${escapeHtml(a.error_message || "")}">${errMsgShort}</td><td>${toggle}</td></tr>`;
        }).join("");
        body.innerHTML = `<table><thead><tr><th>name</th><th>status</th><th>last_activity_at</th><th>errors</th><th>error_message</th><th></th></tr></thead><tbody>${rows}</tbody></table>`;
        body.querySelectorAll("button[data-action]").forEach((btn) => {
          btn.addEventListener("click", () => toggleAdapter(btn.dataset.name, btn.dataset.action));
        });
      } catch (e) {
        body.innerHTML = `<div class="empty">${escapeHtml(e.message)}</div>`;
      }
    }
    $("#refresh-adapters").addEventListener("click", loadAdapters);

    async function toggleAdapter(name, action) {
      try {
        await fetchJson(`/api/adapters/${encodeURIComponent(name)}/${action}`, { method: "POST" });
        loadAdapters();
      } catch (e) {
        alert(e.message);
      }
    }

    // Phase 36 Observability tab: 3-panel loader + render helpers.
    // Pitfall 10 (small sample): percentile cells render the em-dash
    // when sample_count < 10, never a number, never 0ms. Pitfall 11
    // (NULL): agents with total_cost_usd === null render em-dash for
    // cost (same honesty rule the /agents tab uses).
    async function loadObservability() {
      const win = $("#obs-window").value;
      const costBody = $("#obs-cost-body");
      const latencyBody = $("#obs-latency-body");
      const toolsBody = $("#obs-tools-body");
      const fetches = [
        fetchJson("/api/observability/cost?since=" + encodeURIComponent(win))
          .then((d) => renderCostPanel(d, costBody))
          .catch((e) => { costBody.innerHTML = '<div class="empty">' + escapeHtml(e.message) + '</div>'; }),
        fetchJson("/api/observability/latency?since=" + encodeURIComponent(win))
          .then((d) => renderLatencyPanel(d, latencyBody))
          .catch((e) => { latencyBody.innerHTML = '<div class="empty">' + escapeHtml(e.message) + '</div>'; }),
        fetchJson("/api/observability/tools?since=" + encodeURIComponent(win))
          .then((d) => renderToolsPanel(d, toolsBody))
          .catch((e) => { toolsBody.innerHTML = '<div class="empty">' + escapeHtml(e.message) + '</div>'; }),
      ];
      await Promise.all(fetches);
    }

    function renderCostPanel(data, container) {
      if (!data.agents || !data.agents.length) {
        container.innerHTML = '<div class="empty">no cost data in window</div>';
        return;
      }
      const costs = data.agents.map((a) => a.total_cost_usd || 0);
      const maxCost = Math.max(...costs, 0);
      const bars = data.agents.map((a) => {
        if (a.total_cost_usd === null) {
          // Pitfall 11: NULL cost renders as em-dash, not as $0.
          return '<div class="cost-bar"><div class="cost-bar-fill" style="width: 0%"></div><span>' + escapeHtml(a.agent) + ' —</span></div>';
        }
        const pct = maxCost > 0 ? (a.total_cost_usd / maxCost * 100).toFixed(1) : 0;
        const label = escapeHtml(a.agent) + ' $' + a.total_cost_usd.toFixed(6);
        return '<div class="cost-bar"><div class="cost-bar-fill" style="width: ' + pct + '%"></div><span>' + label + '</span></div>';
      }).join("");
      container.innerHTML = bars;
    }

    function renderLatencyPanel(data, container) {
      if (!data || data.sample_count === 0) {
        container.innerHTML = '<div class="empty">no latency data in window</div>';
        return;
      }
      // Pitfall 10 contract: sample_count < 10 hides the percentile
      // behind the em-dash with a hover explaining why. Never 0ms,
      // never a percentile over a sample that small.
      let p50Cell, p95Cell;
      if (data.sample_count < 10) {
        p50Cell = '<td title="need at least 10 runs for percentile">—</td>';
        p95Cell = '<td title="need at least 10 runs for percentile">—</td>';
      } else {
        p50Cell = '<td>' + data.p50_ms + 'ms</td>';
        p95Cell = '<td>' + data.p95_ms + 'ms</td>';
      }
      container.innerHTML = '<table><thead><tr><th>sample_count</th><th>p50</th><th>p95</th></tr></thead><tbody><tr><td>' + data.sample_count + '</td>' + p50Cell + p95Cell + '</tr></tbody></table>';
    }

    function renderToolsPanel(data, container) {
      if (!data.tools || !data.tools.length) {
        container.innerHTML = '<div class="empty">no tool calls in window</div>';
        return;
      }
      const rows = data.tools.map((t) => {
        let rateCell;
        if (t.success_rate === null) {
          rateCell = '<td title="insufficient data (no success or error rows in window)">—</td>';
        } else {
          rateCell = '<td>' + (t.success_rate * 100).toFixed(1) + '%</td>';
        }
        const lastErr = t.last_error_type ? escapeHtml(t.last_error_type) : '';
        return '<tr><td>' + escapeHtml(t.tool_name) + '</td><td>' + t.call_count + '</td>' + rateCell + '<td class="muted">' + lastErr + '</td></tr>';
      }).join("");
      container.innerHTML = '<table><thead><tr><th>tool_name</th><th>call_count</th><th>success_rate</th><th>last_error_type</th></tr></thead><tbody>' + rows + '</tbody></table>';
    }
    $("#refresh-observability").addEventListener("click", loadObservability);
    $("#obs-window").addEventListener("change", loadObservability);

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (c) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
      })[c]);
    }
  </script>
</body>
</html>
